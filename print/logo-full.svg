<?xml version="1.0" encoding="UTF-8"?>
<!-- PACLIC 40 — Full Logo with Name · Print-ready vector SVG -->
<!-- NOTE: Uses Source Serif 4 + Source Sans 3 (Google Fonts).
     For offline print, open in Adobe Illustrator or Inkscape and
     do "Create Outlines" / "Object to Path" to embed all text. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="140mm" height="168mm">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,700&amp;family=Source+Sans+3:wght@400;600&amp;display=swap');
    </style>
    <linearGradient id="petalGradF" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a82050"/>
      <stop offset="100%" stop-color="#de6888"/>
    </linearGradient>
  </defs>

  <!-- ── Flower mark, centred at (200, 185) ── -->
  <g transform="translate(200,175) scale(1.2)">

    <!-- 5 petals -->
    <path d="M0,-10 C-16.67,-16.67 -30,-30 -25,-50 C-20,-63.33 -6.67,-70 0,-63.33 C6.67,-70 20,-63.33 25,-50 C30,-30 16.67,-16.67 0,-10 Z"
          fill="url(#petalGradF)" stroke="#8a1438" stroke-width="1.3" transform="rotate(0)"/>
    <path d="M0,-10 C-16.67,-16.67 -30,-30 -25,-50 C-20,-63.33 -6.67,-70 0,-63.33 C6.67,-70 20,-63.33 25,-50 C30,-30 16.67,-16.67 0,-10 Z"
          fill="url(#petalGradF)" stroke="#8a1438" stroke-width="1.3" transform="rotate(72)"/>
    <path d="M0,-10 C-16.67,-16.67 -30,-30 -25,-50 C-20,-63.33 -6.67,-70 0,-63.33 C6.67,-70 20,-63.33 25,-50 C30,-30 16.67,-16.67 0,-10 Z"
          fill="url(#petalGradF)" stroke="#8a1438" stroke-width="1.3" transform="rotate(144)"/>
    <path d="M0,-10 C-16.67,-16.67 -30,-30 -25,-50 C-20,-63.33 -6.67,-70 0,-63.33 C6.67,-70 20,-63.33 25,-50 C30,-30 16.67,-16.67 0,-10 Z"
          fill="url(#petalGradF)" stroke="#8a1438" stroke-width="1.3" transform="rotate(216)"/>
    <path d="M0,-10 C-16.67,-16.67 -30,-30 -25,-50 C-20,-63.33 -6.67,-70 0,-63.33 C6.67,-70 20,-63.33 25,-50 C30,-30 16.67,-16.67 0,-10 Z"
          fill="url(#petalGradF)" stroke="#8a1438" stroke-width="1.3" transform="rotate(288)"/>

    <!-- 5 long stamens -->
    <g stroke="#f0c030" stroke-width="3.67" stroke-linecap="round">
      <line x1="0"      y1="0"      x2="0"      y2="-40"/>
      <line x1="0"      y1="0"      x2="38.04"  y2="-12.36"/>
      <line x1="0"      y1="0"      x2="23.51"  y2="32.36"/>
      <line x1="0"      y1="0"      x2="-23.51" y2="32.36"/>
      <line x1="0"      y1="0"      x2="-38.04" y2="-12.36"/>
    </g>

    <!-- 10 short stamens -->
    <g stroke="#f0c030" stroke-width="2.67" stroke-linecap="round">
      <line x1="0" y1="0" x2="-9.37"  y2="-23.17"/>
      <line x1="0" y1="0" x2="9.37"   y2="-23.17"/>
      <line x1="0" y1="0" x2="19.17"  y2="-16.07"/>
      <line x1="0" y1="0" x2="24.93"  y2="1.73"/>
      <line x1="0" y1="0" x2="21.20"  y2="13.23"/>
      <line x1="0" y1="0" x2="6.03"   y2="24.27"/>
      <line x1="0" y1="0" x2="-6.03"  y2="24.27"/>
      <line x1="0" y1="0" x2="-21.20" y2="13.23"/>
      <line x1="0" y1="0" x2="-24.93" y2="1.73"/>
      <line x1="0" y1="0" x2="-19.17" y2="-16.07"/>
    </g>

    <!-- Anther dots — long stamens -->
    <g fill="#f0c030">
      <circle cx="0"      cy="-40"    r="4.67"/>
      <circle cx="38.04"  cy="-12.36" r="4.67"/>
      <circle cx="23.51"  cy="32.36"  r="4.67"/>
      <circle cx="-23.51" cy="32.36"  r="4.67"/>
      <circle cx="-38.04" cy="-12.36" r="4.67"/>
    </g>
    <!-- Anther dots — short stamens -->
    <g fill="#f0c030">
      <circle cx="-9.37"  cy="-23.17" r="3.0"/>
      <circle cx="9.37"   cy="-23.17" r="3.0"/>
      <circle cx="19.17"  cy="-16.07" r="3.0"/>
      <circle cx="24.93"  cy="1.73"   r="3.0"/>
      <circle cx="21.20"  cy="13.23"  r="3.0"/>
      <circle cx="6.03"   cy="24.27"  r="3.0"/>
      <circle cx="-6.03"  cy="24.27"  r="3.0"/>
      <circle cx="-21.20" cy="13.23"  r="3.0"/>
      <circle cx="-24.93" cy="1.73"   r="3.0"/>
      <circle cx="-19.17" cy="-16.07" r="3.0"/>
    </g>

    <!-- Gold centre -->
    <circle cx="0" cy="0" r="12.67" fill="#c07808"/>

  </g>

  <!-- ── Decorative rule above name ── -->
  <line x1="130" y1="275" x2="270" y2="275" stroke="#c07808" stroke-width="1.2" opacity="0.6"/>

  <!-- ── PACLIC 40 ── -->
  <text x="200" y="325"
        font-family="'Source Serif 4', Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="64"
        fill="#1b2a42"
        text-anchor="middle"
        letter-spacing="2">PACLIC 40</text>

  <!-- ── Full name ── -->
  <text x="200" y="360"
        font-family="'Source Sans 3', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="18"
        fill="#3a4a5e"
        text-anchor="middle"
        letter-spacing="0.5">Pacific Asia Conference on Language,</text>
  <text x="200" y="383"
        font-family="'Source Sans 3', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="18"
        fill="#3a4a5e"
        text-anchor="middle"
        letter-spacing="0.5">Information &amp; Computation</text>

  <!-- ── Decorative rule below name ── -->
  <line x1="110" y1="402" x2="290" y2="402" stroke="#c07808" stroke-width="1.2" opacity="0.6"/>

  <!-- ── Date & venue ── -->
  <text x="200" y="432"
        font-family="'Source Sans 3', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="15"
        fill="#a82050"
        text-anchor="middle"
        letter-spacing="2">TAIPEI, TAIWAN · DECEMBER 10–12, 2026</text>

</svg>
